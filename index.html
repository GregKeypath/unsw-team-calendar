<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNSW Success Squad Calendar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23111'/><rect x='4' y='8' width='24' height='20' rx='2' fill='%23FFD100'/><rect x='4' y='8' width='24' height='7' rx='2' fill='%23111'/><rect x='9' y='4' width='3' height='7' rx='1.5' fill='%23FFD100'/><rect x='20' y='4' width='3' height='7' rx='1.5' fill='%23FFD100'/><rect x='7' y='19' width='4' height='4' rx='1' fill='%23111'/><rect x='14' y='19' width='4' height='4' rx='1' fill='%23111'/><rect x='21' y='19' width='4' height='4' rx='1' fill='%23111'/></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #FFD100;
      --accent-dark: #e6bc00;
      --accent-text: #111;
      --accent-rgb:  255, 209, 0;

      /* Page background */
      --page-bg: linear-gradient(160deg, #f0f4f8 0%, #e8ecf0 100%);

      /* Pacing section header colours */
      --sec-1-bg: #1e3a5f; --sec-1-txt: #93c5fd;
      --sec-2-bg: #3b0764; --sec-2-txt: #d8b4fe;
      --sec-3-bg: #14532d; --sec-3-txt: #86efac;
      --sec-4-bg: #78350f; --sec-4-txt: #fde68a;
      --sec-5-bg: #1e40af; --sec-5-txt: #bfdbfe;
      --sec-6-bg: #134e4a; --sec-6-txt: #99f6e4;
      --sec-7-bg: #881337; --sec-7-txt: #fda4af;

      /* Calendar day column tints */
      --day-mon: #EFF6FF;
      --day-tue: #F0FDF4;
      --day-wed: #FFFBEB;
      --day-thu: #FDF4FF;
      --day-fri: #FFF1F2;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--page-bg);
      color: #111;
      min-height: 100vh;
    }

    /* Tab navigation */
    .tab-nav {
      background: #fff;
      box-shadow: 0 1px 0 #e5e5e5;
      padding: 0 32px;
      display: flex;
      gap: 0;
    }

    .tab-btn {
      padding: 12px 24px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #888;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: color 0.15s, border-color 0.15s;
      border-radius: 8px 8px 0 0;
    }

    .tab-btn:hover { color: #111; }

    .tab-btn.active {
      color: #111;
      border-bottom-color: var(--accent);
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Yellow utility bar — matches the top strip on studyonline.unsw.edu.au */
    .top-bar {
      background: var(--accent);
      padding: 6px 32px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent-text);
      text-align: right;
      letter-spacing: 0.2px;
    }

    /* White nav bar — matches the site header */
    .site-header {
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .unsw-logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      border-right: 1px solid #ddd;
      padding-right: 18px;
      margin-right: 4px;
    }

    .unsw-logo .logo-unsw {
      font-size: 1.6rem;
      font-weight: 900;
      font-style: italic;
      color: var(--accent);
      letter-spacing: 2px;
      -webkit-text-stroke: 0.5px var(--accent-dark);
    }

    .unsw-logo .logo-sydney {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #111;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.2px;
    }

    /* Nav controls — outlined button style matching "Enquire today" */
    .nav-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-controls button {
      background: #fff;
      border: 1.5px solid #111;
      color: #111;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.2px;
    }

    .nav-controls button:hover {
      background: #111;
      color: #fff;
    }

    #month-label {
      font-size: 1rem;
      font-weight: 700;
      min-width: 170px;
      text-align: center;
      color: #111;
    }

    .today-btn {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: var(--accent-text) !important;
    }

    .today-btn:hover {
      background: var(--accent-dark) !important;
      border-color: var(--accent-dark) !important;
      color: var(--accent-text) !important;
    }

    /* Roster bar */
    .roster-bar {
      max-width: 1400px;
      margin: 20px auto 0;
      padding: 0 32px;
    }

    .roster-heading {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #888;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .roster-cell {
      background: #1a1a1a;
      color: #fff;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .roster-cell .roster-day {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .roster-cell .roster-name {
      font-size: 0.88rem;
    }

    /* Calendar */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 12px 32px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .event-chip { cursor: pointer; }

    .day-cell {
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 14px;
      padding: 12px;
      min-height: 155px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.03);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .day-cell:hover {
      box-shadow: 0 10px 28px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
      transform: translateY(-2px);
    }

    .day-cell.today {
      box-shadow: 0 0 0 2.5px var(--accent), 0 6px 22px rgba(var(--accent-rgb),0.35);
      animation: pulse-today 2.5s ease-in-out infinite;
    }

    @keyframes pulse-today {
      0%, 100% { box-shadow: 0 0 0 2px var(--accent), 0 6px 20px rgba(var(--accent-rgb),0.25); }
      50%       { box-shadow: 0 0 0 4px var(--accent), 0 8px 28px rgba(var(--accent-rgb),0.55); }
    }

    .today-emoji {
      font-size: 1rem;
      line-height: 1;
      animation: bounce-emoji 1.8s ease-in-out infinite;
    }

    @keyframes bounce-emoji {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-3px); }
    }

    /* Per-day colours — Mon through Fri */
    .day-mon { background: var(--day-mon); }
    .day-tue { background: var(--day-tue); }
    .day-wed { background: var(--day-wed); }
    .day-thu { background: var(--day-thu); }
    .day-fri { background: var(--day-fri); }

    .day-label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .day-number {
      font-size: 0.82rem;
      font-weight: 700;
      color: #555;
    }

    .day-name {
      font-size: 0.74rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .day-cell.today .day-number {
      background: var(--accent);
      color: var(--accent-text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 800;
    }

    .day-cell.today .day-name {
      color: #aaa;
    }

    /* Past date — strikethrough on the number + green tick */
    .day-cell.past .day-number {
      text-decoration: line-through;
      text-decoration-color: #aaa;
      color: #ccc;
    }

    .day-cell.past .day-name { color: #bbb; }

    /* Hex week pill — subtle right-aligned label in date row */
    .week-pill {
      margin-left: auto;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #c8c8c8;
      background: rgba(0,0,0,0.04);
      padding: 1px 5px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .past-marker {
      font-size: 0.75rem;
      color: #22c55e;
      font-weight: 800;
      margin-left: 2px;
    }

    /* Month badge — shown on 1st of month */
    .month-badge {
      font-size: 0.6rem;
      font-weight: 800;
      background: #111;
      color: var(--accent);
      padding: 1px 5px;
      letter-spacing: 0.5px;
      margin-right: 2px;
      border-radius: 4px;
    }

    .events-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .event-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: default;
      transition: filter 0.15s;
      border-radius: 7px;
    }

    .event-chip:hover { filter: brightness(0.92); }

    .event-chip .event-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .event-chip .delete-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0 2px;
      opacity: 0.6;
      line-height: 1;
      color: inherit;
    }

    .event-chip:hover .delete-btn { display: inline; }

    .add-event-btn {
      background: none;
      border: 1.5px dashed #ccc;
      color: #bbb;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 4px 8px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 2px;
      letter-spacing: 0.2px;
      border-radius: 7px;
    }

    .add-event-btn:hover { border-color: var(--accent); color: #111; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1);
      animation: pop 0.16s ease;
      overflow: hidden;
      border-radius: 16px;
    }

    @keyframes pop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-header {
      background: #111;
      color: #fff;
      padding: 16px 22px;
      border-bottom: 3px solid var(--accent);
      border-radius: 16px 16px 0 0;
    }

    .modal-header h2 { font-size: 0.92rem; font-weight: 700; }

    .modal-body { padding: 20px 22px 18px; }

    .modal-body input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    .modal-body input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.2);
    }

    .tag-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .tag-picker {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .tag-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 600;
    }

    .tag-option:hover { filter: brightness(0.95); }

    .tag-option.selected {
      border-color: #111;
    }

    .tag-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-cancel {
      background: #fff;
      border: 1.5px solid #bbb;
      color: #555;
    }

    .btn-cancel:hover { background: #f5f5f5; }

    .btn-save {
      background: var(--accent);
      border: 1.5px solid var(--accent);
      color: var(--accent-text);
    }

    .btn-save:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    /* Detail modal extras */
    .modal-body textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    .modal-body textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.2);
    }

    .field-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .event-tag-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .detail-indicators {
      display: flex;
      gap: 4px;
      margin-left: 2px;
    }

    .has-link, .has-note {
      font-size: 0.68rem;
      opacity: 0.7;
    }

    /* Kanban board */
    .kanban-wrap { padding: 20px 32px; overflow-x: auto; }
    .kanban-board { display: flex; gap: 12px; min-width: max-content; align-items: flex-start; }
    .kanban-col { width: 230px; flex-shrink: 0; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06); }
    .kanban-col-header {
      background: #111;
      color: var(--accent);
      padding: 10px 14px;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .col-count {
      background: rgba(var(--accent-rgb),0.2);
      color: var(--accent);
      font-size: 0.68rem;
      padding: 1px 7px;
      font-weight: 700;
      border-radius: 10px;
    }
    .kanban-col-body {
      background: rgba(0,0,0,0.04);
      min-height: 200px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.15s;
      border: 2px solid transparent;
      border-radius: 0 0 12px 12px;
    }
    .kanban-col-body.drag-over { background: rgba(var(--accent-rgb),0.12); border-color: var(--accent); }

    /* Current week column highlight */
    .kanban-col.current-week { box-shadow: 0 0 0 2.5px var(--accent), 0 6px 24px rgba(var(--accent-rgb),0.35); }
    .kanban-col.current-week .kanban-col-header { background: var(--accent); color: var(--accent-text); }
    .kanban-col.current-week .col-count { background: rgba(0,0,0,0.12); color: #111; }
    .current-week-label {
      font-size: 0.58rem;
      font-weight: 800;
      background: #111;
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-left: 6px;
      vertical-align: middle;
    }
    .kanban-card {
      padding: 8px 10px;
      font-size: 0.76rem;
      font-weight: 500;
      line-height: 1.4;
      cursor: grab;
      border-left: 3px solid;
      transition: opacity 0.15s, transform 0.15s;
      user-select: none;
    }
    .kanban-card:hover { transform: translateX(2px); }
    .kanban-card.dragging { opacity: 0.35; cursor: grabbing; }
    .cat-priority   { background: #FEE2E2; color: #991B1B; border-color: #EF4444; }
    .cat-calls      { background: #DBEAFE; color: #1D4ED8; border-color: #3B82F6; }
    .cat-admin      { background: #F1F5F9; color: #475569; border-color: #94A3B8; }
    .cat-leadership { background: #EDE9FE; color: #5B21B6; border-color: #7C3AED; }
    .cat-welcome    { background: #DCFCE7; color: #15803D; border-color: #22C55E; }
    .cat-automated  { background: #FEF3C7; color: #92400E; border-color: #F59E0B; }
    .cat-webinar    { background: #FFEDD5; color: #9A3412; border-color: #F97316; }
    /* UNSW Key Date badges */
    .unsw-dates-row { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:4px; }
    .unsw-badge { display:inline-flex; align-items:center; gap:3px; font-size:0.66rem; font-weight:700; padding:2px 6px 2px 5px; border-radius:6px; white-space:nowrap; letter-spacing:0.1px; }
    .unsw-badge.o-week  { background:#FFF8D6; color:#7A5700; border-left:3px solid var(--accent); }
    .unsw-badge.census  { background:#FEE2E2; color:#991B1B; border-left:3px solid #EF4444; }
    .unsw-badge.results { background:#DCFCE7; color:#14532D; border-left:3px solid #22C55E; }

    /* Card layout */
    .kanban-card { position: relative; display: flex; align-items: flex-start; gap: 8px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-text { flex: 1; min-width: 0; word-break: break-word; padding-right: 40px; }
    .card-actions { display: none; position: absolute; top: 5px; right: 5px; gap: 3px; }
    .kanban-card:hover .card-actions { display: flex; }

    /* Tick / done state */
    .card-check {
      flex-shrink: 0; margin-top: 1px;
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #d1d5db; background: none;
      cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; color: transparent;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .card-check:hover { border-color: #22c55e; color: #22c55e; }
    .kanban-card.done .card-check { background: #22c55e; border-color: #22c55e; color: #fff; }
    .kanban-card.done .card-text { text-decoration: line-through; color: #aaa; }
    .kanban-card.done { opacity: 0.65; }
    .card-btn { border: none; background: rgba(255,255,255,0.85); cursor: pointer; padding: 2px 6px; font-size: 0.7rem; border-radius: 3px; line-height: 1.5; }
    .card-edit-btn:hover { background: #dbeafe; }
    .card-del-btn { color: #ef4444; }
    .card-del-btn:hover { background: #fee2e2; }
    .card-edit-textarea { width: 100%; border: 1.5px solid var(--accent); border-radius: 4px; padding: 5px; font-size: 0.78rem; font-family: inherit; resize: vertical; min-height: 60px; background: #fff; }
    .card-edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .card-save-btn { background: var(--accent); border: none; padding: 3px 10px; border-radius: 3px; font-size: 0.72rem; font-weight: 700; cursor: pointer; color: var(--accent-text); }
    .card-save-btn:hover { background: var(--accent-dark); }
    .card-cancel-btn { background: #f3f4f6; border: 1px solid #ddd; padding: 3px 10px; border-radius: 3px; font-size: 0.72rem; cursor: pointer; }
    /* Add card button per column */
    .kanban-add-btn { width: 100%; margin-top: 6px; padding: 6px; background: none; border: 1.5px dashed #ddd; border-radius: 6px; color: #aaa; font-size: 0.78rem; cursor: pointer; text-align: left; }
    .kanban-add-btn:hover { border-color: var(--accent); color: #111; background: rgba(var(--accent-rgb),0.06); }

  function applyTheme(key) {
    const t = THEMES[key] || THEMES.gold;
    const root = document.documentElement;
    root.style.setProperty('--accent',      t.accent);
    root.style.setProperty('--accent-dark', t.accentDark);
    root.style.setProperty('--accent-text', t.accentText);
    root.style.setProperty('--accent-rgb',  t.accentRgb);
    root.style.setProperty('--page-bg',     t.pageBg);
    // Pacing section headers
    t.sec.forEach((s, i) => {
      root.style.setProperty(`--sec-${i+1}-bg`,  s.bg);
      root.style.setProperty(`--sec-${i+1}-txt`, s.txt);
    });
    // Calendar day columns
    const dayKeys = ['--day-mon','--day-tue','--day-wed','--day-thu','--day-fri'];
    t.days.forEach((d, i) => root.style.setProperty(dayKeys[i], d));
    localStorage.setItem('unsw-theme', key);
    document.querySelectorAll('.theme-swatch').forEach(s =>
      s.classList.toggle('active', s.dataset.theme === key)
    );
    const dot = document.querySelector('.theme-dot');
    if (dot) dot.style.background = t.accent;
  }

  const DB = 'https://unsw-team-calendar-default-rtdb.asia-southeast1.firebasedatabase.app/events.json';
  const PACING_DB = 'https://unsw-team-calendar-default-rtdb.asia-southeast1.firebasedatabase.app/pacing.json';

  let events = {};
  let startDate;   // Monday of the first visible week
  let pendingDateKey = null;
  let selectedTag = 0;

  // Firebase stores arrays as objects — convert back to arrays
  function normalise(data) {
    if (!data || typeof data !== 'object') return {};
    const out = {};
    for (const date in data) {
      const val = data[date];
      if (Array.isArray(val)) {
        out[date] = val.filter(Boolean);
      } else if (typeof val === 'object') {
        out[date] = Object.values(val).filter(Boolean);
      }
    }
    return out;
  }

  // Load events from Firebase then render
  async function loadEvents() {
    try {
      const res = await fetch(DB);
      const data = await res.json();
      events = normalise(data);
      render();
    } catch(e) { console.error('Failed to load events', e); }
  }

  // Save all events back to Firebase
  async function saveEvents() {
    try {
      const res = await fetch(DB, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(events)
      });
      if (!res.ok) console.error('Save failed', res.status);
    } catch(e) { console.error('Failed to save events', e); }
  }

  // Poll Firebase every 10 seconds to pick up changes from other users
  function startPolling() {
    setInterval(async () => {
      try {
        const res = await fetch(DB);
        const data = await res.json();
        events = normalise(data);
        render();
      } catch(e) {}
    }, 10000);
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function render() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const today = new Date(); today.setHours(0,0,0,0);
    const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

    // Header label: "26 May – 20 Jun 2026"
    const endDate = new Date(startDate);
    endDate.setDate(startDate.getDate() + 25); // Friday of week 4
    const fmtD = d => `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
    const rangeLabel = startDate.getFullYear() === endDate.getFullYear()
      ? `${fmtD(startDate)} – ${fmtD(endDate)} ${endDate.getFullYear()}`
      : `${fmtD(startDate)} ${startDate.getFullYear()} – ${fmtD(endDate)} ${endDate.getFullYear()}`;
    document.getElementById('month-label').textContent = rangeLabel;

    // Render 4 weeks × 5 days
    for (let w = 0; w < 4; w++) {
      for (let d = 0; d < 5; d++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + w * 7 + d);

        const y   = date.getFullYear();
        const m   = date.getMonth();
        const day = date.getDate();
        const dow = date.getDay();
        const key = dateKey(y, m, day);
        const isToday = key === todayKey;
        const isPast  = date < today;

        const cell = document.createElement('div');
        cell.className = 'day-cell ' + (DAY_CLASSES[dow] || '') + (isToday ? ' today' : '') + (isPast ? ' past' : '');

        // Day label row
        const labelEl = document.createElement('div');
        labelEl.className = 'day-label';

        const num = document.createElement('div');
        num.className = 'day-number';
        num.textContent = `${day}/${m + 1}`;

        const dayName = document.createElement('div');
        dayName.className = 'day-name';
        dayName.textContent = SHORT_DAYS[dow];

        // Show month name when it changes (first day of month)
        if (day === 1) {
          const mb = document.createElement('span');
          mb.className = 'month-badge';
          mb.textContent = MONTH_NAMES[m].slice(0,3).toUpperCase();
          labelEl.appendChild(mb);
        }

        labelEl.appendChild(num);
        labelEl.appendChild(dayName);

        // Hex week pill
        const wk = UNSW_WEEKS[key];
        if (wk) {
          const pill = document.createElement('span');
          pill.className = 'week-pill';
          pill.textContent = `H${wk.hex} · ${wk.label === 'O-Week' ? 'OW' : wk.label.replace('Week ','W')}`;
          labelEl.appendChild(pill);
        }

        if (isPast) {
          const done = document.createElement('span');
          done.className = 'past-marker';
          done.textContent = '✓';
          labelEl.appendChild(done);
        }

        if (isToday && TODAY_EMOJIS[dow]) {
          const emoji = document.createElement('span');
          emoji.className = 'today-emoji';
          emoji.textContent = TODAY_EMOJIS[dow];
          labelEl.appendChild(emoji);
        }

        cell.appendChild(labelEl);

        // UNSW Key Date badges
        const unswItems = UNSW_DATES[key];
        if (unswItems && unswItems.length) {
          const row = document.createElement('div');
          row.className = 'unsw-dates-row';
          unswItems.forEach(item => {
            const badge = document.createElement('span');
            badge.className = `unsw-badge ${item.type}`;
            const icon = item.type === 'o-week' ? '🎓' : item.type === 'census' ? '📋' : '✅';
            badge.textContent = icon + ' ' + item.label;
            row.appendChild(badge);
          });
          cell.appendChild(row);
        }

        // Events
        const list = document.createElement('div');
        list.className = 'events-list';
        (events[key] || []).forEach((ev, idx) => {
          const tag = TAGS[ev.tag] || TAGS[0];
          const chip = document.createElement('div');
          chip.className = 'event-chip';
          chip.style.background = tag.bg;
          chip.style.color = tag.text;
          chip.style.borderLeft = `3px solid ${tag.dot}`;

          const txt = document.createElement('span');
          txt.className = 'event-text';
          txt.textContent = ev.name;
          chip.appendChild(txt);

          const indicators = document.createElement('span');
          indicators.className = 'detail-indicators';
          if (ev.link)     { const i = document.createElement('span'); i.className='has-link'; i.textContent='🔗'; indicators.appendChild(i); }
          if (ev.comments) { const i = document.createElement('span'); i.className='has-note'; i.textContent='💬'; indicators.appendChild(i); }
          chip.appendChild(indicators);

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '✕';
          del.title = 'Remove event';
          del.addEventListener('click', (e) => {
            e.stopPropagation();
            events[key].splice(idx, 1);
            if (!events[key].length) delete events[key];
            saveEvents(); render();
          });
          chip.appendChild(del);
          chip.addEventListener('click', () => openDetail(key, idx));
          list.appendChild(chip);
        });
        cell.appendChild(list);

        const addBtn = document.createElement('button');
        addBtn.className = 'add-event-btn';
        addBtn.textContent = '+ Add event';
        addBtn.addEventListener('click', () => openModal(key, day, m, y));
        cell.appendChild(addBtn);

        grid.appendChild(cell);
      }
    }
  }

  const overlay = document.getElementById('modal-overlay');
  const input = document.getElementById('event-input');

  function openModal(key, day, month, year) {
    pendingDateKey = key;
    const parts = key.split('-');
    const dow = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2])).getDay();
    document.getElementById('modal-title').textContent =
      `Add Event — ${DAY_NAMES[dow - 1]} ${day} ${MONTH_NAMES[month]} ${year}`;
    input.value = '';
    selectedTag = 0;
    renderTags();
    overlay.classList.add('open');
    setTimeout(() => input.focus(), 50);
  }

    overlay.classList.remove('open');

      const opt = document.createElement('div');
      opt.className = 'tag-option' + (i === selectedTag ? ' selected' : '');
      opt.style.background = t.bg;
      opt.style.color = t.text;
      opt.style.borderColor = i === selectedTag ? t.dot : 'transparent';

      const dot = document.createElement('span');
      dot.className = 'tag-dot';
      dot.style.background = t.dot;
      opt.appendChild(dot);

      const lbl = document.createElement('span');
      lbl.textContent = t.label;

  function calcDerived(r) {
    const pct = (a, b, dec) => (b > 0) ? (a / b * 100).toFixed(dec ?? 1) + '%' : '—';
    const t1t2CensusTarget = r.t1t2pool > 0 ? Math.round(r.t1t2pool * 0.80) : 0;
    const t1t2Needed       = t1t2CensusTarget > 0 ? Math.max(0, t1t2CensusTarget - (r.t1t2 || 0)) : '—';
    const t1t2Remaining    = r.t1t2pool > 0 ? Math.max(0, r.t1t2pool - (r.t1t2 || 0)) : '—';
    return {
      ...r,
      t1t2CensusTarget,
      t1t2Needed,
      t1t2Remaining,
      pctSt:  pct(r.en,   r.st,                2),
      pctIt:  pct(r.en,   r.it,                2),
      pctSt2: pct(r.en,   r.stt,               0),
      pctT1:  pct(r.t1t2, t1t2CensusTarget,    0),
      gcmC:   pct(r.gcm,  r.gcmt,              0),
      cPct:   pct(r.ctd,  r.cohort,            0),
    };
  }

  function calcTotal(rows) {
    const s = { name: 'UNSW Total', cq: null, kR: null, kS: null, k6: null };
    ['st','en','it','stt','t1t2','t1t2pool','gcm','gcmt','cohort','ctd'].forEach(f => {
      s[f] = rows.reduce((acc, r) => acc + (Number(r[f]) || 0), 0);
    });
    const cs = rows.filter(r => r.calls).map(r => Number(r.calls));
    const ss = rows.filter(r => r.sts).map(r => Number(r.sts));
    s.calls = cs.length ? Math.round(cs.reduce((a,b)=>a+b,0)/cs.length) : null;
    s.sts   = ss.length ? Math.round(ss.reduce((a,b)=>a+b,0)/ss.length) : null;
    return calcDerived(s);
  }

  function initPacingData() {
    const data = {};
    for (const [hk, hd] of Object.entries(PACING_DATA)) {
      data[hk] = {
        label: hd.label,
        rows: hd.rows.map(r => {
          const t1t2t = (r.pctT1 && r.pctT1 !== '—' && r.t1t2 > 0)
            ? Math.round(r.t1t2 / (parseFloat(r.pctT1) / 100)) : 0;
          const gcmt = (r.gcmC && r.gcmC !== '—' && r.gcm > 0)
            ? Math.round(r.gcm / (parseFloat(r.gcmC) / 100)) : 0;
          // t1t2pool: reverse from census target (which is 80% of pool)
          const t1t2pool = t1t2t > 0 ? Math.round(t1t2t / 0.80) : 0;
          return { ...r, t1t2t, gcmt, t1t2pool };
        }),
      };
      data[hk].total = calcTotal(data[hk].rows);
    }
    return data;
  }

    const val = r[col.f];

    if (col.type === 'pct' || col.type === 'pct-input') {

      display = kpiBadge(val);
    } else {
      display = `<span class="metric-val">${val ?? '—'}</span>`;
    }

    if (!col.edit || item.isTotal) {
      return `<td class="pc-calc">${display}</td>`;
    }
    return `<td class="pc-editable" data-field="${col.f}" data-hex="${item.hexKey}" data-idx="${item.rowIdx}" data-type="${col.type || 'number'}">${display}</td>`;
  }

        const tbodyRows = rowItems.map(item => {
          const cells = sec.cols.map(col => cellHtml(col, item.r, item)).join('');
          const rowCls = item.isTotal ? 'total-row' : (item.isHex ? 'hex-row' : '');
          return `<tr class="${rowCls}"><td class="sc-name" title="${item.fullName||''}">${item.label}</td>${cells}</tr>`;
        }).join('');
        return `<div class="${cardCls}">
          <div class="sc-hdr ${sec.cls}">${sec.label}</div>
          <table class="sc-table">
            <thead><tr><th></th>${theadCols}</tr></thead>
            <tbody>${tbodyRows}</tbody>
          </table>
        </div>`;
      }).join('') +
    '</div>';
  }

  function saveInlineCell(hexKey, rowIdx, field, rawValue) {
    if (!activePacingData[hexKey]) return;
    const isNumeric = !['cq','kR','kS','k6'].includes(field);
    let value;
    if (field === 'cq') {
      const n = parseFloat(rawValue);
      value = isNaN(n) ? null : n + '%';
    } else if (['kR','kS','k6'].includes(field)) {
      value = rawValue || null;
    } else {
      value = parseFloat(rawValue) || 0;
    }
    activePacingData[hexKey].rows[rowIdx][field] = value;
    const derived = calcDerived(activePacingData[hexKey].rows[rowIdx]);
    Object.assign(activePacingData[hexKey].rows[rowIdx], derived);
    activePacingData[hexKey].total = calcTotal(activePacingData[hexKey].rows);
    savePacingData();
    renderPacing();
  }

      nav.querySelectorAll('.hex-btn').forEach(btn => {
        btn.addEventListener('click', () => {

    // ── Advisor nav ───────────────────────────────────────────────

        btn.addEventListener('click', () => {
          activePacingSSA = btn.dataset.ssa || null;
          renderPacing();
        });
      });
    }

    const content = document.getElementById('pacing-content');
    if (!content) return;

    // ── 4 filter combinations ─────────────────────────────────────
    if (!activePacingHex && activePacingSSA) {
      // All Periods + specific advisor → advisor's progression across every study period
      const rowItems = Object.entries(activePacingData).map(([hexKey, hexData]) => {
        const rowIdx = hexData.rows.findIndex(row => row.name === activePacingSSA);
        if (rowIdx === -1) return null;
        return {
          label:    `<span class="hex-name">${hexData.label}</span>`,
          fullName: hexData.label,
          r:        calcDerived(hexData.rows[rowIdx]),
          showKpi: true, isTotal: false, isHex: false,
          hexKey, rowIdx
        };
      }).filter(Boolean);
      content.innerHTML = buildSectionCards(rowItems);

    } else if (activePacingHex && activePacingSSA) {
      // Specific period + specific advisor → that person's data for that period
      const hex = activePacingData[activePacingHex];
      if (!hex) return;
      const rowIdx = hex.rows.findIndex(r => r.name === activePacingSSA);
      if (rowIdx === -1) { content.innerHTML = '<p style="padding:20px;color:#888">No data for this combination.</p>'; return; }
      content.innerHTML = buildSectionCards([{
        label:    `<span class="ssa-name">${hex.rows[rowIdx].name.split(' ')[0]}</span>`,
        fullName: hex.rows[rowIdx].name,
        r:        calcDerived(hex.rows[rowIdx]),
        showKpi: true, isTotal: false, isHex: false,
        hexKey: activePacingHex, rowIdx
      }]);

    } else {
      // Specific period (or default H3) + all advisors → all advisors for that period
      const hexKey = activePacingHex || 'H3';
      const hex = activePacingData[hexKey];
      if (!hex) return;
      const visibleRows = hex.rows.filter(r => !HIDDEN_SSA.includes(r.name));
      const rowItems = [
        ...visibleRows.map(r => ({
          label:    `<span class="ssa-name">${r.name.split(' ')[0]}</span>`,
          fullName: r.name,
          r:        calcDerived(r),
          showKpi: true, isTotal: false, isHex: false,
          hexKey, rowIdx: hex.rows.indexOf(r)
        })),
        { label: '<span class="ssa-name" style="color:#888">Total</span>', fullName: 'UNSW Total',
          r: calcTotal(visibleRows), showKpi: false, isTotal: true, isHex: false,
          hexKey, rowIdx: 'total' }

      content.innerHTML = buildSectionCards(rowItems);

  document.getElementById('tab-pacing').addEventListener('click', e => {
    const cell = e.target.closest('td.pc-editable');
    if (!cell || cell.querySelector('input, select')) return;

    const field  = cell.dataset.field;
    const hexKey = cell.dataset.hex;
    const rowIdx = parseInt(cell.dataset.idx);
    const type   = cell.dataset.type;
    const r      = activePacingData[hexKey]?.rows[rowIdx];
    if (!r) return;

    cell.innerHTML = '';

    if (type === 'kpi-select') {
      const sel = document.createElement('select');
      sel.className = 'pc-inline-select';
      [['','— N/A'],['EXCEPTIONAL PERFORMANCE','⭐ Exceptional'],
       ['ACHIEVED EXPECTATIONS','✓ Achieved'],['SUPPORT NEEDED','⚠ Support']].forEach(([v,l]) => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = l;
        if ((r[field]||'') === v) opt.selected = true;
        sel.appendChild(opt);
      });
      cell.appendChild(sel);
      sel.focus();
      const save = () => saveInlineCell(hexKey, rowIdx, field, sel.value);
      sel.addEventListener('change', save);
      sel.addEventListener('blur', save);
    } else {
      const inp = document.createElement('input');
      inp.type = 'number'; inp.min = 0;
      inp.className = 'pc-inline-input';
      if (type === 'pct-input') inp.max = 100;
      const cur = r[field];
      inp.value = cur !== null && cur !== undefined ? (parseFloat(cur) || 0) : 0;
      cell.appendChild(inp);
      inp.select(); inp.focus();
      inp.addEventListener('blur', () => saveInlineCell(hexKey, rowIdx, field, inp.value));

  const WISH_TAGS = {
    SEA:       { label: 'SEA Wishlist',        cls: 'wtag-sea' },
    Marketing: { label: 'Marketing Wishlist',   cls: 'wtag-marketing' },
    CRM:       { label: 'CRM / Tech Wishlist',  cls: 'wtag-crm' },
  };

  let wishlistData   = {};
  let wishlistFilter = 'all';
  let wishlistSort   = 'votes';
  let wishlistLoaded = false;

  function wEsc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getMyVotes() {
    try { return JSON.parse(localStorage.getItem('wishlist-votes') || '[]'); }
    catch(e) { return []; }
  }
  function setMyVotes(arr) {
    localStorage.setItem('wishlist-votes', JSON.stringify(arr));
  }

  async function loadWishlist() {
    try {
      const res  = await fetch(WISHLIST_DB);
      const data = await res.json();
      wishlistData = (data && typeof data === 'object' && !Array.isArray(data)) ? data : {};
    } catch(e) { wishlistData = {}; }
    wishlistLoaded = true;
    renderWishlist();
  }

  async function saveWishItem(item) {
    const url = WISHLIST_DB.replace(/\.json$/, `/${item.id}.json`);
    try {
      await fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(item),
      });
    } catch(e) { console.error('saveWishItem failed', e); }
  }

  function toggleVote(itemId) {
    const item = wishlistData[itemId];
    if (!item) return;
    const myVotes = getMyVotes();
    if (myVotes.includes(itemId)) {
      item.votes = Math.max(0, (item.votes || 0) - 1);
      setMyVotes(myVotes.filter(id => id !== itemId));
    } else {
      item.votes = (item.votes || 0) + 1;
      setMyVotes([...myVotes, itemId]);
    }
    wishlistData[itemId] = item;
    saveWishItem(item);
    renderWishlist();
  }

  function renderWishlist() {
    const grid = document.getElementById('wishlist-grid');
    if (!grid) return;
    const myVotes = getMyVotes();
    let items = Object.values(wishlistData);
    if (wishlistFilter !== 'all') items = items.filter(it => it.tag === wishlistFilter);
    if (wishlistSort === 'votes') items.sort((a,b) => (b.votes||0) - (a.votes||0));
    else items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

    if (!items.length) {
      grid.innerHTML = `<div class="wishlist-empty">No items yet.<br>Be the first to add a wish! 🌟</div>`;
      return;
    }

    grid.innerHTML = items.map(item => {
      const tag   = WISH_TAGS[item.tag] || WISH_TAGS.SEA;
      const voted = myVotes.includes(item.id);
      const date  = item.createdAt
        ? new Date(item.createdAt).toLocaleDateString('en-AU', { day:'numeric', month:'short' })
        : '';
      const footer = [item.author ? `— ${wEsc(item.author)}` : '', date].filter(Boolean).join(' · ');
      return `<div class="wish-card">
        <span class="wish-tag-badge ${tag.cls}">${tag.label}</span>
        <div class="wish-title">${wEsc(item.title)}</div>
        ${item.description ? `<div class="wish-desc">${wEsc(item.description)}</div>` : ''}
        <div class="wish-footer">
          <span class="wish-author">${footer}</span>
          <button class="wish-vote-btn ${voted ? 'voted' : ''}" data-id="${item.id}">
            ▲ <span class="wish-vote-count">${item.votes || 0}</span>
          </button>
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.wish-vote-btn').forEach(btn => {
      btn.addEventListener('click', () => toggleVote(btn.dataset.id));
    });
  }

    const title = form.querySelector('[name="title"]').value.trim();

    const tag   = form.querySelector('[name="tag"]:checked')?.value;
    const author= form.querySelector('[name="author"]').value.trim();
    if (!title || !tag) return;
    const id   = 'w' + Date.now() + Math.random().toString(36).slice(2,5);
    const item = { id, title, description: desc, tag, author, votes: 0, createdAt: Date.now() };
    wishlistData[id] = item;
    saveWishItem(item);
    renderWishlist();
    form.reset();

      { id:'k110', text:'Go back to PRIORITY: 1. T1-T2  2. Registration  3. Reengagement', cat:'priority' },
      { id:'k111', text:'Failed Subject Last 12 Months - At Risk Retention Calls', cat:'calls' },
      { id:'k112', text:'#Previous TP Dropped - At Risk Calls', cat:'calls' },
      { id:'k113', text:'Winback or NCA - GCM & Withdrawn Winbacks (Final Attempts)', cat:'calls' },
      { id:'k114', text:'Welcome Calls', cat:'welcome' },
      { id:'k115', text:'Welcome Webinar (WC webinar 1 & 2)', cat:'webinar' },
    ],
  };

  let kanbanBoard = null;

  async function loadKanban() {
    try {
      const res = await fetch(KANBAN_DB);
      const data = await res.json();
      if (data && typeof data === 'object' && Object.keys(data).length > 0) {
        kanbanBoard = {};
        for (const col in data) {
          const val = data[col];
          if (Array.isArray(val)) kanbanBoard[col] = val.filter(Boolean);
          else if (typeof val === 'object') kanbanBoard[col] = Object.values(val).filter(Boolean);
          else kanbanBoard[col] = [];
        }
        // Ensure all columns exist
        KANBAN_COLS.forEach(c => { if (!kanbanBoard[c.id]) kanbanBoard[c.id] = []; });
      } else {
        kanbanBoard = JSON.parse(JSON.stringify(KANBAN_INITIAL));
      }
    } catch(e) {
      kanbanBoard = JSON.parse(JSON.stringify(KANBAN_INITIAL));
    }
    renderKanban();
  }

  async function saveKanban() {
    try {
      await fetch(KANBAN_DB, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(kanbanBoard)
      });
    } catch(e) {}
  }

  function renderKanban() {
    const board = document.getElementById('kanban-board');
    if (!board) return;
    board.innerHTML = '';

    // Work out which column is the current hex week
    const now = new Date();
    const todayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const todayWeek = UNSW_WEEKS[todayKey];
    let currentColId = null;
    if (todayWeek) {
      currentColId = todayWeek.label === 'O-Week' ? 'o-week'
                   : 'week-' + todayWeek.label.replace('Week ', '');
    }

    KANBAN_COLS.forEach(col => {
      const cards = kanbanBoard[col.id] || [];
      const isCurrent = col.id === currentColId;

      const colEl = document.createElement('div');
      colEl.className = 'kanban-col' + (isCurrent ? ' current-week' : '');

      const doneCount = cards.filter(c => c.done).length;
      const header = document.createElement('div');
      header.className = 'kanban-col-header';
      const nowBadge = isCurrent ? ` <span class="current-week-label">Now</span>` : '';
      header.innerHTML = `<span>${col.label}${nowBadge}</span><span class="col-count">${doneCount > 0 ? doneCount + '/' : ''}${cards.length}</span>`;

      const body = document.createElement('div');
      body.className = 'kanban-col-body';
      body.dataset.col = col.id;

      cards.forEach(card => body.appendChild(createKanbanCard(card, col.id)));

      // Add card button
      const addBtn = document.createElement('button');
      addBtn.className = 'kanban-add-btn';
      addBtn.textContent = '+ Add item';
      addBtn.addEventListener('click', () => {
        const textarea = document.createElement('textarea');
        textarea.className = 'card-edit-textarea';
        textarea.placeholder = 'Type item...';
        const saveBtn = document.createElement('button');
        saveBtn.className = 'card-save-btn';
        saveBtn.textContent = '✓ Add';
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'card-cancel-btn';
        cancelBtn.textContent = '✕';
        const rowEl = document.createElement('div');
        rowEl.className = 'kanban-new-row';
        const actRow = document.createElement('div');
        actRow.className = 'card-edit-actions';
        actRow.appendChild(saveBtn);
        actRow.appendChild(cancelBtn);
        rowEl.appendChild(textarea);
        rowEl.appendChild(actRow);
        body.insertBefore(rowEl, addBtn);
        textarea.focus();
        saveBtn.addEventListener('click', () => {
          const text = textarea.value.trim();
          if (!text) return;
          const newCard = { id: 'k' + Date.now(), text, cat: 'admin' };
          if (!kanbanBoard[col.id]) kanbanBoard[col.id] = [];
          kanbanBoard[col.id].push(newCard);
          saveKanban();
          renderKanban();
        });
        cancelBtn.addEventListener('click', () => rowEl.remove());
      });

      body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('drag-over'); });
      body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
      body.addEventListener('drop', e => {
        e.preventDefault();
        body.classList.remove('drag-over');
        const cardId  = e.dataTransfer.getData('kanbanCardId');
        const fromCol = e.dataTransfer.getData('kanbanFromCol');
        if (!cardId || fromCol === col.id) return;
        const src = kanbanBoard[fromCol];
        const idx = src.findIndex(c => c.id === cardId);
        if (idx === -1) return;
        const [moved] = src.splice(idx, 1);
        if (!kanbanBoard[col.id]) kanbanBoard[col.id] = [];
        kanbanBoard[col.id].push(moved);
        saveKanban();
        renderKanban();
      });

      colEl.appendChild(header);
      colEl.appendChild(body);
      body.appendChild(addBtn);
      board.appendChild(colEl);
    });
  }

  function createKanbanCard(card, colId) {
    const el = document.createElement('div');
    el.className = `kanban-card cat-${card.cat}${card.done ? ' done' : ''}`;
    el.setAttribute('draggable', 'true');

    // Tick checkbox
    const checkBtn = document.createElement('button');
    checkBtn.className = 'card-check';
    checkBtn.title = card.done ? 'Mark incomplete' : 'Mark complete';
    checkBtn.textContent = '✓';
    checkBtn.addEventListener('click', e => {
      e.stopPropagation();
      card.done = !card.done;
      const col = kanbanBoard[colId];
      const idx = col ? col.findIndex(c => c.id === card.id) : -1;
      if (idx !== -1) col[idx].done = card.done;
      saveKanban();
      renderKanban();
    });

    const textEl = document.createElement('span');
    textEl.className = 'card-text';
    textEl.textContent = card.text;

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'card-btn card-edit-btn';
    editBtn.textContent = '✏️';
    editBtn.title = 'Edit';

    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn card-del-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Delete';

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    el.appendChild(checkBtn);
    el.appendChild(textEl);
    el.appendChild(actions);

    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('kanbanCardId', card.id);
      e.dataTransfer.setData('kanbanFromCol', colId);
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));

    // Edit
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      el.setAttribute('draggable', 'false');
      const textarea = document.createElement('textarea');
      textarea.className = 'card-edit-textarea';
      textarea.value = card.text;
      const saveBtn = document.createElement('button');
      saveBtn.className = 'card-save-btn';
      saveBtn.textContent = '✓ Save';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'card-cancel-btn';
      cancelBtn.textContent = '✕ Cancel';
      const editRow = document.createElement('div');
      editRow.className = 'card-edit-actions';
      editRow.appendChild(saveBtn);
      editRow.appendChild(cancelBtn);
      el.innerHTML = '';
      el.appendChild(textarea);
      el.appendChild(editRow);
      textarea.focus();
      saveBtn.addEventListener('click', () => {
        const newText = textarea.value.trim();
        if (!newText) return;
        card.text = newText;
        const col = kanbanBoard[colId];
        const idx = col ? col.findIndex(c => c.id === card.id) : -1;
        if (idx !== -1) col[idx].text = newText;
        saveKanban();
        renderKanban();
      });
      cancelBtn.addEventListener('click', () => renderKanban());
    });

    // Delete
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      const col = kanbanBoard[colId];
      if (!col) return;
      const idx = col.findIndex(c => c.id === card.id);
      if (idx !== -1) col.splice(idx, 1);
      saveKanban();
      renderKanban();
    });

    return el;
  }
</script>
</body>
</html>
