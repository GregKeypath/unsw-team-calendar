<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNSW Success Squad Calendar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23111'/><rect x='4' y='8' width='24' height='20' rx='2' fill='%23FFD100'/><rect x='4' y='8' width='24' height='7' rx='2' fill='%23111'/><rect x='9' y='4' width='3' height='7' rx='1.5' fill='%23FFD100'/><rect x='20' y='4' width='3' height='7' rx='1.5' fill='%23FFD100'/><rect x='7' y='19' width='4' height='4' rx='1' fill='%23111'/><rect x='14' y='19' width='4' height='4' rx='1' fill='%23111'/><rect x='21' y='19' width='4' height='4' rx='1' fill='%23111'/></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
      min-height: 100vh;
    }

    /* Tab navigation */
    .tab-nav {
      background: #fff;
      border-bottom: 2px solid #e5e5e5;
      padding: 0 32px;
      display: flex;
      gap: 0;
    }

    .tab-btn {
      padding: 12px 24px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #888;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: #111; }

    .tab-btn.active {
      color: #111;
      border-bottom-color: #FFD100;
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Yellow utility bar — matches the top strip on studyonline.unsw.edu.au */
    .top-bar {
      background: #FFD100;
      padding: 6px 32px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #111;
      text-align: right;
      letter-spacing: 0.2px;
    }

    /* White nav bar — matches the site header */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .unsw-logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      border-right: 1px solid #ddd;
      padding-right: 18px;
      margin-right: 4px;
    }

    .unsw-logo .logo-unsw {
      font-size: 1.6rem;
      font-weight: 900;
      font-style: italic;
      color: #FFD100;
      letter-spacing: 2px;
      -webkit-text-stroke: 0.5px #d4a900;
    }

    .unsw-logo .logo-sydney {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #111;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.2px;
    }

    /* Nav controls — outlined button style matching "Enquire today" */
    .nav-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-controls button {
      background: #fff;
      border: 1.5px solid #111;
      color: #111;
      padding: 7px 16px;
      border-radius: 0;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.2px;
    }

    .nav-controls button:hover {
      background: #111;
      color: #fff;
    }

    #month-label {
      font-size: 1rem;
      font-weight: 700;
      min-width: 170px;
      text-align: center;
      color: #111;
    }

    .today-btn {
      background: #FFD100 !important;
      border-color: #FFD100 !important;
      color: #111 !important;
    }

    .today-btn:hover {
      background: #e6bc00 !important;
      border-color: #e6bc00 !important;
      color: #111 !important;
    }

    /* Roster bar */
    .roster-bar {
      max-width: 1400px;
      margin: 20px auto 0;
      padding: 0 32px;
    }

    .roster-heading {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #888;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .roster-cell {
      background: #1a1a1a;
      color: #fff;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .roster-cell .roster-day {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #FFD100;
    }

    .roster-cell .roster-name {
      font-size: 0.88rem;
    }

    /* Calendar */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 12px 32px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .event-chip { cursor: pointer; }

    .day-cell {
      border: 1px solid rgba(0,0,0,0.07);
      border-top: 3px solid transparent;
      padding: 12px;
      min-height: 155px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: border-top-color 0.15s, box-shadow 0.15s;
    }

    .day-cell:hover {
      border-top-color: #FFD100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .day-cell.today {
      border-top-color: #FFD100;
      box-shadow: 0 0 0 2px #FFD100, 0 4px 18px rgba(255,209,0,0.3);
      animation: pulse-today 2.5s ease-in-out infinite;
    }

    @keyframes pulse-today {
      0%, 100% { box-shadow: 0 0 0 2px #FFD100, 0 4px 18px rgba(255,209,0,0.25); }
      50%       { box-shadow: 0 0 0 3px #FFD100, 0 4px 24px rgba(255,209,0,0.5); }
    }

    .today-emoji {
      font-size: 1rem;
      line-height: 1;
      animation: bounce-emoji 1.8s ease-in-out infinite;
    }

    @keyframes bounce-emoji {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-3px); }
    }

    /* Per-day colours — Mon through Fri */
    .day-mon { background: #EFF6FF; }
    .day-tue { background: #F0FDF4; }
    .day-wed { background: #FFFBEB; }
    .day-thu { background: #FDF4FF; }
    .day-fri { background: #FFF1F2; }

    .day-label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .day-number {
      font-size: 0.82rem;
      font-weight: 700;
      color: #555;
    }

    .day-name {
      font-size: 0.74rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .day-cell.today .day-number {
      background: #FFD100;
      color: #111;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .day-cell.today .day-name {
      color: #aaa;
    }

    /* Past date — strikethrough on the number + green tick */
    .day-cell.past .day-number {
      text-decoration: line-through;
      text-decoration-color: #aaa;
      color: #ccc;
    }

    .day-cell.past .day-name { color: #bbb; }

    /* Hex week pill — subtle right-aligned label in date row */
    .week-pill {
      margin-left: auto;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #c8c8c8;
      background: rgba(0,0,0,0.04);
      padding: 1px 5px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .past-marker {
      font-size: 0.75rem;
      color: #22c55e;
      font-weight: 800;
      margin-left: 2px;
    }

    /* Month badge — shown on 1st of month */
    .month-badge {
      font-size: 0.6rem;
      font-weight: 800;
      background: #111;
      color: #FFD100;
      padding: 1px 5px;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }

    .events-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .event-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: default;
      transition: filter 0.15s;
    }

    .event-chip:hover { filter: brightness(0.92); }

    .event-chip .event-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .event-chip .delete-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0 2px;
      opacity: 0.6;
      line-height: 1;
      color: inherit;
    }

    .event-chip:hover .delete-btn { display: inline; }

    .add-event-btn {
      background: none;
      border: 1.5px dashed #ccc;
      color: #bbb;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 4px 8px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 2px;
      letter-spacing: 0.2px;
    }

    .add-event-btn:hover { border-color: #FFD100; color: #111; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      animation: pop 0.16s ease;
      overflow: hidden;
    }

    @keyframes pop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-header {
      background: #111;
      color: #fff;
      padding: 16px 22px;
      border-bottom: 3px solid #FFD100;
    }

    .modal-header h2 { font-size: 0.92rem; font-weight: 700; }

    .modal-body { padding: 20px 22px 18px; }

    .modal-body input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    .modal-body input[type="text"]:focus {
      border-color: #FFD100;
      box-shadow: 0 0 0 3px rgba(255,209,0,0.2);
    }

    .tag-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .tag-picker {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .tag-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      border-radius: 2px;
      font-size: 0.84rem;
      font-weight: 600;
    }

    .tag-option:hover { filter: brightness(0.95); }

    .tag-option.selected {
      border-color: #111;
    }

    .tag-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 9px 20px;
      border-radius: 0;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-cancel {
      background: #fff;
      border: 1.5px solid #bbb;
      color: #555;
    }

    .btn-cancel:hover { background: #f5f5f5; }

    .btn-save {
      background: #FFD100;
      border: 1.5px solid #FFD100;
      color: #111;
    }

    .btn-save:hover { background: #e6bc00; border-color: #e6bc00; }

    /* Detail modal extras */
    .modal-body textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    .modal-body textarea:focus {
      border-color: #FFD100;
      box-shadow: 0 0 0 3px rgba(255,209,0,0.2);
    }

    .field-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .event-tag-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .detail-indicators {
      display: flex;
      gap: 4px;
      margin-left: 2px;
    }

    .has-link, .has-note {
      font-size: 0.68rem;
      opacity: 0.7;
    }

    /* Kanban board */
    .kanban-wrap { padding: 20px 32px; overflow-x: auto; }
    .kanban-board { display: flex; gap: 12px; min-width: max-content; align-items: flex-start; }
    .kanban-col { width: 230px; flex-shrink: 0; display: flex; flex-direction: column; }
    .kanban-col-header {
      background: #111;
      color: #FFD100;
      padding: 10px 14px;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .col-count {
      background: rgba(255,209,0,0.2);
      color: #FFD100;
      font-size: 0.68rem;
      padding: 1px 7px;
      font-weight: 700;
    }
    .kanban-col-body {
      background: rgba(0,0,0,0.04);
      min-height: 200px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.15s;
      border: 2px solid transparent;
    }
    .kanban-col-body.drag-over { background: rgba(255,209,0,0.12); border-color: #FFD100; }
    .kanban-card {
      padding: 8px 10px;
      font-size: 0.76rem;
      font-weight: 500;
      line-height: 1.4;
      cursor: grab;
      border-left: 3px solid;
      transition: opacity 0.15s, transform 0.15s;
      user-select: none;
    }
    .kanban-card:hover { transform: translateX(2px); }
    .kanban-card.dragging { opacity: 0.35; cursor: grabbing; }
    .cat-priority   { background: #FEE2E2; color: #991B1B; border-color: #EF4444; }
    .cat-calls      { background: #DBEAFE; color: #1D4ED8; border-color: #3B82F6; }
    .cat-admin      { background: #F1F5F9; color: #475569; border-color: #94A3B8; }
    .cat-leadership { background: #EDE9FE; color: #5B21B6; border-color: #7C3AED; }
    .cat-welcome    { background: #DCFCE7; color: #15803D; border-color: #22C55E; }
    .cat-automated  { background: #FEF3C7; color: #92400E; border-color: #F59E0B; }
    .cat-webinar    { background: #FFEDD5; color: #9A3412; border-color: #F97316; }
    /* UNSW Key Date badges */
    .unsw-dates-row { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:4px; }
    .unsw-badge { display:inline-flex; align-items:center; gap:3px; font-size:0.66rem; font-weight:700; padding:2px 6px 2px 5px; border-radius:3px; white-space:nowrap; letter-spacing:0.1px; }
    .unsw-badge.o-week  { background:#FFF8D6; color:#7A5700; border-left:3px solid #FFD100; }
    .unsw-badge.census  { background:#FEE2E2; color:#991B1B; border-left:3px solid #EF4444; }
    .unsw-badge.results { background:#DCFCE7; color:#14532D; border-left:3px solid #22C55E; }

    /* Card edit/delete actions */
    .kanban-card { position: relative; }
    .card-text { display: block; padding-right: 44px; }
    .card-actions { display: none; position: absolute; top: 5px; right: 5px; gap: 3px; }
    .kanban-card:hover .card-actions { display: flex; }
    .card-btn { border: none; background: rgba(255,255,255,0.85); cursor: pointer; padding: 2px 6px; font-size: 0.7rem; border-radius: 3px; line-height: 1.5; }
    .card-edit-btn:hover { background: #dbeafe; }
    .card-del-btn { color: #ef4444; }
    .card-del-btn:hover { background: #fee2e2; }
    .card-edit-textarea { width: 100%; border: 1.5px solid #FFD100; border-radius: 4px; padding: 5px; font-size: 0.78rem; font-family: inherit; resize: vertical; min-height: 60px; background: #fff; }
    .card-edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .card-save-btn { background: #FFD100; border: none; padding: 3px 10px; border-radius: 3px; font-size: 0.72rem; font-weight: 700; cursor: pointer; }
    .card-save-btn:hover { background: #e6bc00; }
    .card-cancel-btn { background: #f3f4f6; border: 1px solid #ddd; padding: 3px 10px; border-radius: 3px; font-size: 0.72rem; cursor: pointer; }
    /* Add card button per column */
    .kanban-add-btn { width: 100%; margin-top: 6px; padding: 6px; background: none; border: 1.5px dashed #ddd; border-radius: 6px; color: #aaa; font-size: 0.78rem; cursor: pointer; text-align: left; }
    .kanban-add-btn:hover { border-color: #FFD100; color: #111; background: #fffbeb; }
  </style>
</head>
<body>

<!-- Yellow top bar -->
<div class="top-bar">UNSW Success Squad Calendar</div>

<!-- White site header with UNSW branding -->
<header class="site-header">
  <div class="logo-area">
    <div class="unsw-logo">
      <span class="logo-unsw">UNSW</span>
      <span class="logo-sydney">Sydney</span>
    </div>
    <span class="header-title">Success Squad Calendar</span>
  </div>

  <div class="nav-controls">
    <button id="prev-btn">&#8592;</button>
    <span id="month-label"></span>
    <button id="next-btn">&#8594;</button>
    <button class="today-btn" id="today-btn">Today</button>
  </div>
</header>

<!-- Tab navigation -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="calendar">📅 Calendar</button>
  <button class="tab-btn" data-tab="kanban">📊 Engagement Strategy</button>
</nav>

<!-- Calendar tab -->
<div class="tab-panel active" id="tab-calendar">

<!-- Shared Inbox Roster -->
<div class="roster-bar">
  <div class="roster-heading">📥 Shared Inbox Roster</div>
  <div class="roster-grid">
    <div class="roster-cell"><span class="roster-day">Monday</span><span class="roster-name">Milly</span></div>
    <div class="roster-cell"><span class="roster-day">Tuesday</span><span class="roster-name">Sachin</span></div>
    <div class="roster-cell"><span class="roster-day">Wednesday</span><span class="roster-name">Priscilla</span></div>
    <div class="roster-cell"><span class="roster-day">Thursday</span><span class="roster-name">D</span></div>
    <div class="roster-cell"><span class="roster-day">Friday</span><span class="roster-name">Kimmi</span></div>
  </div>
</div>

<div class="calendar-grid" id="calendar-grid"></div>

</div><!-- end tab-calendar -->

<!-- Kanban tab -->
<div class="tab-panel" id="tab-kanban">
  <div class="kanban-wrap">
    <div class="kanban-board" id="kanban-board"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add Event</h2>
    </div>
    <div class="modal-body">
      <input type="text" id="event-input" placeholder="Event name..." maxlength="80" />
      <div class="tag-label">Event Type</div>
      <div class="tag-picker" id="tag-picker"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-btn">Cancel</button>
        <button class="btn-save" id="save-btn">Add Event</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detail-title">Event Details</h2>
    </div>
    <div class="modal-body">
      <div id="detail-tag-badge" class="event-tag-badge"></div>
      <div class="field-label">Link</div>
      <input type="text" id="detail-link" placeholder="https://..." maxlength="300" />
      <div class="field-label">Comments</div>
      <textarea id="detail-comments" placeholder="Add notes or comments..."></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="detail-cancel-btn">Close</button>
        <button class="btn-save" id="detail-save-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
  const TAGS = [
    { label: 'Internal Meeting', bg: '#DBEAFE', text: '#1D4ED8', dot: '#3B82F6' },
    { label: 'Calendar Block',   bg: '#F3F4F6', text: '#374151', dot: '#6B7280' },
    { label: 'APAC Meeting',     bg: '#EDE9FE', text: '#5B21B6', dot: '#7C3AED' },
    { label: 'Training',         bg: '#D1FAE5', text: '#065F46', dot: '#10B981' },
  ];

  // Get the Monday of the week containing a given date
  function getMonday(d) {
    const date = new Date(d);
    date.setHours(0,0,0,0);
    const day = date.getDay();
    date.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
    return date;
  }

  const DB = 'https://unsw-team-calendar-default-rtdb.asia-southeast1.firebasedatabase.app/events.json';

  let events = {};
  let startDate;   // Monday of the first visible week
  let pendingDateKey = null;
  let selectedTag = 0;

  // Firebase stores arrays as objects — convert back to arrays
  function normalise(data) {
    if (!data || typeof data !== 'object') return {};
    const out = {};
    for (const date in data) {
      const val = data[date];
      if (Array.isArray(val)) {
        out[date] = val.filter(Boolean);
      } else if (typeof val === 'object') {
        out[date] = Object.values(val).filter(Boolean);
      }
    }
    return out;
  }

  // Load events from Firebase then render
  async function loadEvents() {
    try {
      const res = await fetch(DB);
      const data = await res.json();
      events = normalise(data);
      render();
    } catch(e) { console.error('Failed to load events', e); }
  }

  // Save all events back to Firebase
  async function saveEvents() {
    try {
      const res = await fetch(DB, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(events)
      });
      if (!res.ok) console.error('Save failed', res.status);
    } catch(e) { console.error('Failed to save events', e); }
  }

  // Poll Firebase every 10 seconds to pick up changes from other users
  function startPolling() {
    setInterval(async () => {
      try {
        const res = await fetch(DB);
        const data = await res.json();
        events = normalise(data);
        render();
      } catch(e) {}
    }, 10000);
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function render() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const today = new Date(); today.setHours(0,0,0,0);
    const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

    // Header label: "26 May – 20 Jun 2026"
    const endDate = new Date(startDate);
    endDate.setDate(startDate.getDate() + 25); // Friday of week 4
    const fmtD = d => `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
    const rangeLabel = startDate.getFullYear() === endDate.getFullYear()
      ? `${fmtD(startDate)} – ${fmtD(endDate)} ${endDate.getFullYear()}`
      : `${fmtD(startDate)} ${startDate.getFullYear()} – ${fmtD(endDate)} ${endDate.getFullYear()}`;
    document.getElementById('month-label').textContent = rangeLabel;

    // Render 4 weeks × 5 days
    for (let w = 0; w < 4; w++) {
      for (let d = 0; d < 5; d++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + w * 7 + d);

        const y   = date.getFullYear();
        const m   = date.getMonth();
        const day = date.getDate();
        const dow = date.getDay();
        const key = dateKey(y, m, day);
        const isToday = key === todayKey;
        const isPast  = date < today;

        const cell = document.createElement('div');
        cell.className = 'day-cell ' + (DAY_CLASSES[dow] || '') + (isToday ? ' today' : '') + (isPast ? ' past' : '');

        // Day label row
        const labelEl = document.createElement('div');
        labelEl.className = 'day-label';

        const num = document.createElement('div');
        num.className = 'day-number';
        num.textContent = `${day}/${m + 1}`;

        const dayName = document.createElement('div');
        dayName.className = 'day-name';
        dayName.textContent = SHORT_DAYS[dow];

        // Show month name when it changes (first day of month)
        if (day === 1) {
          const mb = document.createElement('span');
          mb.className = 'month-badge';
          mb.textContent = MONTH_NAMES[m].slice(0,3).toUpperCase();
          labelEl.appendChild(mb);
        }

        labelEl.appendChild(num);
        labelEl.appendChild(dayName);

        // Hex week pill
        const wk = UNSW_WEEKS[key];
        if (wk) {
          const pill = document.createElement('span');
          pill.className = 'week-pill';
          pill.textContent = `H${wk.hex} · ${wk.label === 'O-Week' ? 'OW' : wk.label.replace('Week ','W')}`;
          labelEl.appendChild(pill);
        }

        if (isPast) {
          const done = document.createElement('span');
          done.className = 'past-marker';
          done.textContent = '✓';
          labelEl.appendChild(done);
        }

        if (isToday && TODAY_EMOJIS[dow]) {
          const emoji = document.createElement('span');
          emoji.className = 'today-emoji';
          emoji.textContent = TODAY_EMOJIS[dow];
          labelEl.appendChild(emoji);
        }

        cell.appendChild(labelEl);

        // UNSW Key Date badges
        const unswItems = UNSW_DATES[key];
        if (unswItems && unswItems.length) {
          const row = document.createElement('div');
          row.className = 'unsw-dates-row';
          unswItems.forEach(item => {
            const badge = document.createElement('span');
            badge.className = `unsw-badge ${item.type}`;
            const icon = item.type === 'o-week' ? '🎓' : item.type === 'census' ? '📋' : '✅';
            badge.textContent = icon + ' ' + item.label;
            row.appendChild(badge);
          });
          cell.appendChild(row);
        }

        // Events
        const list = document.createElement('div');
        list.className = 'events-list';
        (events[key] || []).forEach((ev, idx) => {
          const tag = TAGS[ev.tag] || TAGS[0];
          const chip = document.createElement('div');
          chip.className = 'event-chip';
          chip.style.background = tag.bg;
          chip.style.color = tag.text;
          chip.style.borderLeft = `3px solid ${tag.dot}`;

          const txt = document.createElement('span');
          txt.className = 'event-text';
          txt.textContent = ev.name;
          chip.appendChild(txt);

          const indicators = document.createElement('span');
          indicators.className = 'detail-indicators';
          if (ev.link)     { const i = document.createElement('span'); i.className='has-link'; i.textContent='🔗'; indicators.appendChild(i); }
          if (ev.comments) { const i = document.createElement('span'); i.className='has-note'; i.textContent='💬'; indicators.appendChild(i); }
          chip.appendChild(indicators);

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '✕';
          del.title = 'Remove event';
          del.addEventListener('click', (e) => {
            e.stopPropagation();
            events[key].splice(idx, 1);
            if (!events[key].length) delete events[key];
            saveEvents(); render();
          });
          chip.appendChild(del);
          chip.addEventListener('click', () => openDetail(key, idx));
          list.appendChild(chip);
        });
        cell.appendChild(list);

        const addBtn = document.createElement('button');
        addBtn.className = 'add-event-btn';
        addBtn.textContent = '+ Add event';
        addBtn.addEventListener('click', () => openModal(key, day, m, y));
        cell.appendChild(addBtn);

        grid.appendChild(cell);
      }
    }
  }

  const overlay = document.getElementById('modal-overlay');

  function openModal(key, day, month, year) {
    pendingDateKey = key;
    const parts = key.split('-');
    const dow = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2])).getDay();
    document.getElementById('modal-title').textContent =
      `Add Event — ${DAY_NAMES[dow - 1]} ${day} ${MONTH_NAMES[month]} ${year}`;
    input.value = '';
    selectedTag = 0;
    renderTags();
    overlay.classList.add('open');
    setTimeout(() => input.focus(), 50);
  }

  function closeModal() {
    overlay.classList.remove('open');
    pendingDateKey = null;
  }

  function renderTags() {
    const picker = document.getElementById('tag-picker');
    picker.innerHTML = '';
    TAGS.forEach((t, i) => {
      const opt = document.createElement('div');
      opt.className = 'tag-option' + (i === selectedTag ? ' selected' : '');
      opt.style.background = t.bg;
      opt.style.color = t.text;
      opt.style.borderColor = i === selectedTag ? t.dot : 'transparent';

      const dot = document.createElement('span');
      dot.className = 'tag-dot';
      dot.style.background = t.dot;
      opt.appendChild(dot);

      const lbl = document.createElement('span');
      lbl.textContent = t.label;
      opt.appendChild(lbl);

      opt.addEventListener('click', () => { selectedTag = i; renderTags(); });
      picker.appendChild(opt);
    });
  }

  function saveEvent() {
    const name = input.value.trim();
    if (!name || !pendingDateKey) return;
    if (!events[pendingDateKey]) events[pendingDateKey] = [];
    events[pendingDateKey].push({ name, tag: selectedTag });
    saveEvents();
    render();
    closeModal();
  }

  let kanbanBoard = null;

  async function loadKanban() {
    try {
      const res = await fetch(KANBAN_DB);
      const data = await res.json();
      if (data && typeof data === 'object' && Object.keys(data).length > 0) {
        kanbanBoard = {};
        for (const col in data) {
          const val = data[col];
          if (Array.isArray(val)) kanbanBoard[col] = val.filter(Boolean);
          else if (typeof val === 'object') kanbanBoard[col] = Object.values(val).filter(Boolean);
          else kanbanBoard[col] = [];
        }
        // Ensure all columns exist
        KANBAN_COLS.forEach(c => { if (!kanbanBoard[c.id]) kanbanBoard[c.id] = []; });
      } else {
        kanbanBoard = JSON.parse(JSON.stringify(KANBAN_INITIAL));
      }
    } catch(e) {
      kanbanBoard = JSON.parse(JSON.stringify(KANBAN_INITIAL));
    }
    renderKanban();
  }

  async function saveKanban() {
    try {
      await fetch(KANBAN_DB, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(kanbanBoard)
      });
    } catch(e) {}
  }

  function renderKanban() {
    const board = document.getElementById('kanban-board');
    if (!board) return;
    board.innerHTML = '';

    KANBAN_COLS.forEach(col => {
      const cards = kanbanBoard[col.id] || [];

      const colEl = document.createElement('div');
      colEl.className = 'kanban-col';

      const header = document.createElement('div');
      header.className = 'kanban-col-header';
      header.innerHTML = `<span>${col.label}</span><span class="col-count">${cards.length}</span>`;

      const body = document.createElement('div');
      body.className = 'kanban-col-body';
      body.dataset.col = col.id;

      cards.forEach(card => body.appendChild(createKanbanCard(card, col.id)));

      // Add card button
      const addBtn = document.createElement('button');
      addBtn.className = 'kanban-add-btn';
      addBtn.textContent = '+ Add item';
      addBtn.addEventListener('click', () => {
        const textarea = document.createElement('textarea');
        textarea.className = 'card-edit-textarea';
        textarea.placeholder = 'Type item...';
        const saveBtn = document.createElement('button');
        saveBtn.className = 'card-save-btn';
        saveBtn.textContent = '✓ Add';
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'card-cancel-btn';
        cancelBtn.textContent = '✕';
        const rowEl = document.createElement('div');
        rowEl.style.cssText = 'background:#fff;border:1.5px solid #FFD100;border-radius:6px;padding:8px;';
        const actRow = document.createElement('div');
        actRow.className = 'card-edit-actions';
        actRow.appendChild(saveBtn);
        actRow.appendChild(cancelBtn);
        rowEl.appendChild(textarea);
        rowEl.appendChild(actRow);
        body.insertBefore(rowEl, addBtn);
        textarea.focus();
        saveBtn.addEventListener('click', () => {
          const text = textarea.value.trim();
          if (!text) return;
          const newCard = { id: 'k' + Date.now(), text, cat: 'admin' };
          if (!kanbanBoard[col.id]) kanbanBoard[col.id] = [];
          kanbanBoard[col.id].push(newCard);
          saveKanban();
          renderKanban();
        });
        cancelBtn.addEventListener('click', () => rowEl.remove());
      });

      body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('drag-over'); });
      body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
      body.addEventListener('drop', e => {
        e.preventDefault();
        body.classList.remove('drag-over');
        const cardId  = e.dataTransfer.getData('kanbanCardId');
        const fromCol = e.dataTransfer.getData('kanbanFromCol');
        if (!cardId || fromCol === col.id) return;
        const src = kanbanBoard[fromCol];
        const idx = src.findIndex(c => c.id === cardId);
        if (idx === -1) return;
        const [moved] = src.splice(idx, 1);
        if (!kanbanBoard[col.id]) kanbanBoard[col.id] = [];
        kanbanBoard[col.id].push(moved);
        saveKanban();
        renderKanban();
      });

      colEl.appendChild(header);
      colEl.appendChild(body);
      body.appendChild(addBtn);
      board.appendChild(colEl);
    });
  }

  function createKanbanCard(card, colId) {
    const el = document.createElement('div');
    el.className = `kanban-card cat-${card.cat}`;
    el.setAttribute('draggable', 'true');

    const textEl = document.createElement('span');
    textEl.className = 'card-text';
    textEl.textContent = card.text;

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'card-btn card-edit-btn';
    editBtn.textContent = '✏️';
    editBtn.title = 'Edit';

    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn card-del-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Delete';

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    el.appendChild(textEl);
    el.appendChild(actions);

    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('kanbanCardId', card.id);
      e.dataTransfer.setData('kanbanFromCol', colId);
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));

    // Edit
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      el.setAttribute('draggable', 'false');
      const textarea = document.createElement('textarea');
      textarea.className = 'card-edit-textarea';
      textarea.value = card.text;
      const saveBtn = document.createElement('button');
      saveBtn.className = 'card-save-btn';
      saveBtn.textContent = '✓ Save';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'card-cancel-btn';
      cancelBtn.textContent = '✕ Cancel';
      const editRow = document.createElement('div');
      editRow.className = 'card-edit-actions';
      editRow.appendChild(saveBtn);
      editRow.appendChild(cancelBtn);
      el.innerHTML = '';
      el.appendChild(textarea);
      el.appendChild(editRow);
      textarea.focus();
      saveBtn.addEventListener('click', () => {
        const newText = textarea.value.trim();
        if (!newText) return;
        card.text = newText;
        const col = kanbanBoard[colId];
        const idx = col ? col.findIndex(c => c.id === card.id) : -1;
        if (idx !== -1) col[idx].text = newText;
        saveKanban();
        renderKanban();
      });
      cancelBtn.addEventListener('click', () => renderKanban());
    });

    // Delete
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      const col = kanbanBoard[colId];
      if (!col) return;
      const idx = col.findIndex(c => c.id === card.id);
      if (idx !== -1) col.splice(idx, 1);
      saveKanban();
      renderKanban();
    });

    return el;
  }
</script>
